# Coolify deployment for this Plausible Analytics fork.
# In Coolify: New Resource -> Docker Compose (Build Pack: Compose from Git)
# and set "Docker Compose Location" to: /docker-compose.coolify.yml
#
# Secrets, passwords and the public URL are generated automatically by Coolify
# via the SERVICE_* "magic" environment variables on the first deploy and then
# kept stable across redeploys.
services:
  plausible_db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      start_period: 1m

  plausible_events_db:
    image: clickhouse/clickhouse-server:24.12-alpine
    restart: always
    volumes:
      - event-data:/var/lib/clickhouse
      - event-logs:/var/log/clickhouse-server
      - ./clickhouse/logs.xml:/etc/clickhouse-server/config.d/logs.xml:ro
      - ./clickhouse/ipv4-only.xml:/etc/clickhouse-server/config.d/ipv4-only.xml:ro
      - ./clickhouse/low-resources.xml:/etc/clickhouse-server/config.d/low-resources.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      - CLICKHOUSE_SKIP_USER_SETUP=1
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://127.0.0.1:8123/ping || exit 1"]
      start_period: 1m

  plausible:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - MIX_ENV=ce
    restart: always
    command: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    depends_on:
      plausible_db:
        condition: service_healthy
      plausible_events_db:
        condition: service_healthy
    volumes:
      - plausible-data:/var/lib/plausible
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      # --- Coolify routing: exposes the container's port 8000 on your domain ---
      - SERVICE_FQDN_PLAUSIBLE_8000
      # --- required ---
      - BASE_URL=$SERVICE_URL_PLAUSIBLE
      # MIGRATION: set SECRET_KEY_BASE in Coolify's "Environment Variables" tab to
      # the SAME value as the OLD server (keeps existing sessions valid). For a
      # brand-new install instead, generate it with: openssl rand -base64 64
      - SECRET_KEY_BASE
      # No 2FA users exist on the old server, so there is no encrypted TOTP data to
      # preserve -> Coolify generates a fresh 32-byte key (enables 2FA going forward).
      - TOTP_VAULT_KEY=${SERVICE_REALBASE64_32_TOTP}
      # --- databases ---
      - DATABASE_URL=postgres://postgres:${SERVICE_PASSWORD_POSTGRES}@plausible_db:5432/plausible_db
      - CLICKHOUSE_DATABASE_URL=http://plausible_events_db:8123/plausible_events_db
      # --- registration ---
      # Set to "false" for the very first deploy so you can create the first
      # account, then change to "true" (or "invite_only") in Coolify afterwards.
      - DISABLE_REGISTRATION=${DISABLE_REGISTRATION:-false}
      - TMPDIR=/var/lib/plausible/tmp
      # Optional features (email/SMTP, geolocation, Google) are intentionally NOT
      # listed as bare passthrough vars: Coolify would inject them as empty strings
      # ("") which breaks boolean/URL parsing at boot. To enable them, add the
      # specific variables WITH real values in Coolify's "Environment Variables"
      # tab, e.g. ENABLE_EMAIL_VERIFICATION=true, MAILER_ADAPTER=Bamboo.SMTPAdapter,
      # SMTP_HOST_ADDR=..., SMTP_HOST_SSL_ENABLED=true, GOOGLE_CLIENT_ID=..., etc.
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://127.0.0.1:8000/api/health || exit 1"]
      start_period: 2m
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  db-data:
  event-data:
  event-logs:
  plausible-data:
